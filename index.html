<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SONIX DEMO</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="landing">

  <!-- Background -->
  <img src="assets/bg.jpg" class="bg">

  <!-- Dark Overlay -->
  <div class="overlay"></div>

  <!-- ORB -->
  <div class="orb-container">
    <div class="orb" id="orb"></div>
  </div>

  <!-- Invisible Tap Zone -->
  <div id="tap-zone"></div>

  <!-- Voice Feedback -->
  <div id="voice-ui">
    <div class="pulse"></div>
    <p id="voice-text">Say "open categories"</p>
  </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
